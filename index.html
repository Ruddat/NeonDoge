<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VOID RUNNER - Endless Neon Build</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #071021 0%, #000 68%);
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            cursor: none;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            color: #0ff;
            font-size: 18px;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.72);
            padding: 15px;
            border: 2px solid #0ff;
            border-radius: 10px;
            min-width: 210px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
            letter-spacing: 4px;
        }

        p { margin: 5px 0 0 0; opacity: 0.92; }

        .bar-bg {
            width: 200px;
            height: 10px;
            background: #333;
            margin-top: 5px;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            width: 100%;
            transition: width 0.2s;
        }

        #upgrade-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        h2 {
            color: #fff;
            font-size: 40px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px #fff;
            letter-spacing: 5px;
            text-align: center;
        }

        .choices { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }

        .choice {
            width: 220px;
            min-height: 118px;
            padding: 20px;
            border: 2px solid #fff;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .choice:hover {
            transform: translateY(-6px) scale(1.04);
            border-color: #f0f;
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 30px #f0f;
        }

        .choice h3 { margin: 0 0 10px 0; color: #ff0; font-size: 24px; }
        .choice p { font-size: 14px; color: #ccc; }
        .choice small { display: block; margin-top: 10px; color: #0ff; }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            text-align: center;
            display: none;
            text-shadow: 0 0 30px #0ff;
            pointer-events: none;
            z-index: 50;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.82; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.07); }
        }
    </style>
</head>
<body>
<div id="ui-layer">
    <div class="stat-box">
        <h1>VOID RUNNER</h1>
        <p>SCORE: <span id="scoreVal">0</span></p>
        <p>NEXT LEVEL: <span id="nextLevelVal">1000</span></p>
        <p>THREAT: <span id="threatVal">1.0x</span></p>
    </div>

    <div class="stat-box">
        <p>LEVEL: <span id="levelVal">1</span></p>
        <p>HEALTH:</p>
        <div class="bar-bg"><div class="bar-fill" id="healthBar"></div></div>
        <p style="margin-top:10px">WEAPON: <span id="weaponVal">Standard</span></p>
        <p>EFFECT: <span id="effectVal">-</span></p>
    </div>
</div>

<div id="upgrade-menu">
    <h2>LEVEL UP! Wähle ein Upgrade:</h2>
    <div class="choices" id="choicesContainer"></div>
</div>

<div id="message"></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('message');
    const upgradeMenu = document.getElementById('upgrade-menu');
    const choicesContainer = document.getElementById('choicesContainer');
    const healthBar = document.getElementById('healthBar');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const FPS = 60;
    const LIMITS = {
        bullets: 180,
        enemies: 42,
        particles: 360,
        powerUps: 6,
        worms: 4,
        bosses: 1,
        satellites: 3,
        bulletCount: 4,
        bulletSize: 2.4,
        magnetRange: 420,
        playerSpeed: 2.6
    };

    let score = 0;
    let health = 100;
    let level = 1;
    let nextLevelScore = 1000;
    let frameCount = 0;
    let gameRunning = true;
    let isPaused = false;
    let bossDefeatedThisLevel = false;

    const player = { x: 150, y: canvas.height / 2 };

    const weapon = {
        fireCooldown: 10,
        cooldownLeft: 0,
        bulletSizeMod: 1,
        bulletCount: 1
    };

    const effects = {
        rapid: 0,
        shield: 0,
        spread: 0
    };

    let satellites = [];
    let magnetRange = 0;
    let playerSpeed = 1;
    let isInvincible = false;
    let invincibleTimer = 0;

    let bullets = [];
    let enemies = [];
    let particles = [];
    let powerUps = [];
    let worms = [];
    let bosses = [];
    let stars = [];

    for (let i = 0; i < 170; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 3 + 0.5
        });
    }

    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
    let mouseDown = false;
    canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('mousedown', () => mouseDown = true);
    canvas.addEventListener('mouseup', () => mouseDown = false);

    const upgradesPool = [
        {
            name: 'Satellit',
            desc: 'Eine Drohne kreist um dich und schießt. Maximal 3.',
            current: () => `${satellites.length}/${LIMITS.satellites}`,
            available: () => satellites.length < LIMITS.satellites,
            action: () => satellites.push({ angle: Math.random() * Math.PI * 2, cooldown: 0 })
        },
        {
            name: 'Magnet',
            desc: 'Zieht Powerups aus größerer Entfernung an. Gedeckelt.',
            current: () => `${magnetRange}/${LIMITS.magnetRange}`,
            available: () => magnetRange < LIMITS.magnetRange,
            action: () => { magnetRange = Math.min(LIMITS.magnetRange, magnetRange + 120); }
        },
        {
            name: 'Großkaliber',
            desc: 'Schüsse werden stärker, aber nicht endlos riesig.',
            current: () => `${weapon.bulletSizeMod.toFixed(1)}x/${LIMITS.bulletSize}x`,
            available: () => weapon.bulletSizeMod < LIMITS.bulletSize,
            action: () => { weapon.bulletSizeMod = Math.min(LIMITS.bulletSize, weapon.bulletSizeMod + 0.35); }
        },
        {
            name: 'Turbo',
            desc: 'Bessere Steuerreaktion. Maximalwert verhindert Chaos.',
            current: () => `${playerSpeed.toFixed(1)}x/${LIMITS.playerSpeed}x`,
            available: () => playerSpeed < LIMITS.playerSpeed,
            action: () => { playerSpeed = Math.min(LIMITS.playerSpeed, playerSpeed + 0.25); }
        },
        {
            name: 'Heilung',
            desc: '+45 HP. Überschreibt keine Balance.',
            current: () => `${health}/100`,
            available: () => health < 100,
            action: () => { health = Math.min(health + 45, 100); }
        },
        {
            name: 'Mehrschuss',
            desc: 'Ein zusätzlicher permanenter Schuss. Maximal 4.',
            current: () => `${weapon.bulletCount}/${LIMITS.bulletCount}`,
            available: () => weapon.bulletCount < LIMITS.bulletCount,
            action: () => { weapon.bulletCount = Math.min(LIMITS.bulletCount, weapon.bulletCount + 1); }
        },
        {
            name: 'Kühlkörper',
            desc: 'Reduziert den Waffen-Cooldown permanent. Minimalwert bleibt aktiv.',
            current: () => `${weapon.fireCooldown} Frames`,
            available: () => weapon.fireCooldown > 5,
            action: () => { weapon.fireCooldown = Math.max(5, weapon.fireCooldown - 1); }
        }
    ];

    function openUpgradeMenu() {
        isPaused = true;
        upgradeMenu.style.display = 'flex';
        choicesContainer.innerHTML = '';

        let available = upgradesPool.filter(upgrade => upgrade.available());
        if (available.length < 3) available = upgradesPool;

        const options = [...available].sort(() => Math.random() - 0.5).slice(0, 3);
        options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'choice';
            div.innerHTML = `<h3>${opt.name}</h3><p>${opt.desc}</p><small>Aktuell: ${opt.current()}</small>`;
            div.onclick = () => {
                if (opt.available()) opt.action();
                closeUpgradeMenu();
            };
            choicesContainer.appendChild(div);
        });
    }

    function closeUpgradeMenu() {
        isPaused = false;
        upgradeMenu.style.display = 'none';
    }

    function update() {
        if (!gameRunning) return;
        if (isPaused) {
            requestAnimationFrame(update);
            return;
        }

        frameCount++;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        updateStars();
        handleLevelProgression();
        handlePlayer();
        handleTimers();

        if (mouseDown) tryFireBullets();

        handleSpawning();
        updateBullets();
        updateEnemies();
        updateWorms();
        updateBosses();
        updatePowerUps();
        updateParticles();
        updateSatellites();
        drawPlayer();
        drawUI();
        enforceEntityCaps();

        requestAnimationFrame(update);
    }

    function threatLevel() {
        return 1 + Math.min(4.5, (level - 1) * 0.16 + score / 85000);
    }

    function updateStars() {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        const threat = threatLevel();
        stars.forEach(s => {
            s.x -= s.speed * threat;
            if (s.x < 0) {
                s.x = canvas.width;
                s.y = Math.random() * canvas.height;
            }
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function handleLevelProgression() {
        while (score >= nextLevelScore) {
            level++;
            bossDefeatedThisLevel = false;
            nextLevelScore += 1400 + level * 850 + Math.floor(level * level * 90);
            levelUp();
        }
    }

    function handlePlayer() {
        const speed = 0.10 + (playerSpeed * 0.024);
        player.x += (mouse.x - player.x) * speed;
        player.y += (mouse.y - player.y) * speed;
        player.x = Math.max(50, Math.min(canvas.width - 50, player.x));
        player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

        if (frameCount % 2 === 0) {
            particles.push({ x: player.x - 30, y: player.y + (Math.random() * 16 - 8), size: 8, life: 20, maxLife: 20, color: '#0ff', vx: -3 - threatLevel(), vy: 0 });
        }
    }

    function handleTimers() {
        if (weapon.cooldownLeft > 0) weapon.cooldownLeft--;

        Object.keys(effects).forEach(key => {
            if (effects[key] > 0) effects[key]--;
        });

        if (invincibleTimer > 0) invincibleTimer--;
        isInvincible = invincibleTimer > 0 || effects.shield > 0;
    }

    function currentFireCooldown() {
        const rapidBonus = effects.rapid > 0 ? 0.48 : 1;
        return Math.max(3, Math.round(weapon.fireCooldown * rapidBonus));
    }

    function currentBulletCount() {
        return Math.min(LIMITS.bulletCount + 1, weapon.bulletCount + (effects.spread > 0 ? 1 : 0));
    }

    function tryFireBullets() {
        if (weapon.cooldownLeft > 0) return;
        fireBullets();
        weapon.cooldownLeft = currentFireCooldown();
    }

    function updateSatellites() {
        satellites.forEach((sat, index) => {
            sat.angle += 0.045 + index * 0.004;
            const radius = 58 + index * 15;
            const satX = player.x + Math.cos(sat.angle) * radius;
            const satY = player.y + Math.sin(sat.angle) * radius;

            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f0f';
            ctx.fillStyle = '#f0f';
            ctx.beginPath();
            ctx.arc(satX, satY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            sat.cooldown--;
            if (sat.cooldown <= 0 && bullets.length < LIMITS.bullets) {
                bullets.push({ x: satX, y: satY, speed: 8, vy: 0, size: 3, damage: 7, color: '#f0f', isEnemy: false });
                sat.cooldown = 22;
            }
        });
    }

    function fireBullets() {
        const count = currentBulletCount();
        const spread = count === 1 ? 0 : 0.16;

        for (let i = 0; i < count; i++) {
            const angle = (i - (count - 1) / 2) * spread;
            const vy = Math.sin(angle) * 4.2;
            bullets.push({
                x: player.x + 24,
                y: player.y,
                speed: 12.5,
                vy,
                size: 4 * weapon.bulletSizeMod,
                damage: Math.round(8 + weapon.bulletSizeMod * 5),
                color: '#ff0',
                isEnemy: false
            });
        }
    }

    function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.speed;
            b.y += b.vy || 0;

            ctx.shadowBlur = 15;
            ctx.shadowColor = b.color || '#ff0';
            ctx.fillStyle = b.color || '#ff0';
            ctx.beginPath();
            ctx.ellipse(b.x, b.y, Math.max(4, b.size * 2), Math.max(2, b.size / 2), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            if (b.isEnemy && !isInvincible && Math.hypot(player.x - b.x, player.y - b.y) < b.size + 14) {
                bullets.splice(i, 1);
                damagePlayer(12, b.x, b.y);
                continue;
            }

            if (b.x > canvas.width + 90 || b.x < -90 || b.y < -90 || b.y > canvas.height + 90) {
                bullets.splice(i, 1);
            }
        }
    }

    function handleSpawning() {
        const bossActive = bosses.length > 0;
        const threat = threatLevel();

        if (!bossActive && enemies.length < LIMITS.enemies && Math.random() < 0.018 + threat * 0.006) spawnEnemy();
        if (!bossActive && worms.length < LIMITS.worms && Math.random() < 0.0014 + threat * 0.00035) spawnWorm();

        if (level > 1 && level % 3 === 0 && !bossActive && !bossDefeatedThisLevel) {
            spawnBoss();
        }

        if (powerUps.length < LIMITS.powerUps && Math.random() < 0.0038) spawnPowerUp();
    }

    function spawnEnemy() {
        const threat = threatLevel();
        enemies.push({
            x: canvas.width + 50,
            y: 40 + Math.random() * (canvas.height - 80),
            size: 18 + Math.random() * 20,
            hp: 14 + level * 2,
            speed: 2.3 + threat + Math.random() * 1.2,
            rotation: 0,
            rotSpeed: (Math.random() - 0.5) * 0.12
        });
    }

    function updateEnemies() {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.x -= e.speed;
            e.rotation += e.rotSpeed;

            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.rotation);
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f00';
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            for (let j = 0; j < 6; j++) {
                const angle = (Math.PI * 2 / 6) * j;
                const r = e.size * (j % 2 === 0 ? 1 : 0.62);
                if (j === 0) ctx.moveTo(r, 0);
                else ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();

            if (checkEnemyCollisions(e, i)) continue;
            if (e.x < -70) enemies.splice(i, 1);
        }
    }

    function spawnWorm() {
        const startY = Math.random() * (canvas.height - 200) + 100;
        const segmentCount = Math.min(14, 6 + Math.floor(level / 2));
        const worm = { segments: [], speed: 1.8 + threatLevel() * 0.3, angle: 0 };

        for (let i = 0; i < segmentCount; i++) {
            worm.segments.push({
                x: canvas.width + (i * 22),
                y: startY,
                size: i === 0 ? 20 : 14,
                hp: i === 0 ? 35 : 18,
                isHead: i === 0
            });
        }
        worms.push(worm);
    }

    function updateWorms() {
        for (let w = worms.length - 1; w >= 0; w--) {
            const worm = worms[w];
            const head = worm.segments[0];
            if (!head) {
                worms.splice(w, 1);
                continue;
            }

            head.x -= worm.speed;
            worm.angle += 0.05;
            head.y += Math.sin(worm.angle) * 3;

            for (let i = 1; i < worm.segments.length; i++) {
                const current = worm.segments[i];
                const target = worm.segments[i - 1];
                const dx = target.x - current.x;
                const dy = target.y - current.y;
                const distance = Math.hypot(dx, dy);
                if (distance > 15) {
                    current.x += dx * 0.2;
                    current.y += dy * 0.2;
                }
            }

            let wormDead = false;
            for (let s = worm.segments.length - 1; s >= 0; s--) {
                const seg = worm.segments[s];
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#d0d';
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, seg.size, 0, Math.PI * 2);
                ctx.fillStyle = seg.isHead ? '#ffd700' : '#d0d';
                ctx.fill();
                ctx.shadowBlur = 0;

                if (!isInvincible && Math.hypot(player.x - seg.x, player.y - seg.y) < seg.size + 14) {
                    damagePlayer(20, seg.x, seg.y);
                    destroyWorm(w);
                    wormDead = true;
                    break;
                }

                for (let b = bullets.length - 1; b >= 0; b--) {
                    const bullet = bullets[b];
                    if (bullet.isEnemy) continue;
                    if (Math.hypot(bullet.x - seg.x, bullet.y - seg.y) < seg.size + bullet.size) {
                        bullets.splice(b, 1);
                        seg.hp -= bullet.damage || 10;
                        if (seg.hp <= 0) {
                            if (seg.isHead) {
                                score += 500;
                                createMegaExplosion(seg.x, seg.y);
                                showMessage('MEGA KILL!');
                                destroyWorm(w);
                                wormDead = true;
                            } else {
                                createExplosion(seg.x, seg.y, '#ffaa00');
                                worm.segments.splice(s, 1);
                                score += 65;
                            }
                        }
                        break;
                    }
                }
                if (wormDead) break;
            }

            if (wormDead) continue;
            if (head.x < -140) worms.splice(w, 1);
        }
    }

    function destroyWorm(index) {
        if (!worms[index]) return;
        worms[index].segments.forEach(seg => createExplosion(seg.x, seg.y, '#d0d'));
        worms.splice(index, 1);
    }

    function spawnBoss() {
        showMessage('WARNUNG: BOSS INCOMING!');
        const hp = 520 + level * 125;
        bosses.push({
            x: canvas.width + 220,
            y: canvas.height / 2,
            width: 150,
            height: 112,
            hp,
            maxHp: hp,
            speed: 1.8 + level * 0.04,
            dirY: 1,
            shootTimer: 0,
            phase: 1,
            pulse: 0
        });
    }

    function updateBosses() {
        for (let i = bosses.length - 1; i >= 0; i--) {
            const boss = bosses[i];
            if (boss.x > canvas.width - 260) boss.x -= 2.3;

            boss.phase = boss.hp < boss.maxHp * 0.45 ? 2 : 1;
            boss.pulse += 0.08;
            boss.y += boss.speed * boss.dirY * boss.phase;
            if (boss.y < 110 || boss.y > canvas.height - 110) boss.dirY *= -1;

            boss.shootTimer++;
            const shootDelay = boss.phase === 2 ? 28 : 42;
            if (boss.shootTimer >= shootDelay) {
                const pattern = boss.phase === 2 ? [-2, -1, 0, 1, 2] : [-1, 0, 1];
                pattern.forEach(j => bullets.push({
                    x: boss.x - 20,
                    y: boss.y + j * 18,
                    speed: boss.phase === 2 ? -7.3 : -6.2,
                    vy: j * 0.55,
                    size: 7,
                    damage: 12,
                    color: '#f00',
                    isEnemy: true
                }));
                boss.shootTimer = 0;
            }

            drawBoss(boss);
            handleBossCollisions(boss, i);
        }
    }

    function drawBoss(boss) {
        const x = boss.x;
        const y = boss.y;
        const pulse = Math.sin(boss.pulse) * 4;

        ctx.save();
        ctx.translate(x, y);
        ctx.shadowBlur = 24;
        ctx.shadowColor = boss.phase === 2 ? '#f00' : '#0f0';

        const gradient = ctx.createLinearGradient(-80, -60, 80, 60);
        gradient.addColorStop(0, boss.phase === 2 ? '#ff003c' : '#00ff88');
        gradient.addColorStop(0.5, '#091018');
        gradient.addColorStop(1, '#00f6ff');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(-80, -52);
        ctx.lineTo(48, -38 - pulse);
        ctx.lineTo(84, 0);
        ctx.lineTo(48, 38 + pulse);
        ctx.lineTo(-80, 52);
        ctx.lineTo(-52, 0);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#050505';
        ctx.beginPath();
        ctx.arc(10, 0, 20 + pulse * 0.25, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = boss.phase === 2 ? '#fff' : '#f00';
        ctx.beginPath();
        ctx.arc(10, 0, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f0f';
        ctx.fillRect(-92, -34, 32, 13);
        ctx.fillRect(-92, 21, 32, 13);

        ctx.restore();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#333';
        ctx.fillRect(canvas.width / 2 - 170, 80, 340, 20);
        ctx.fillStyle = boss.phase === 2 ? '#f00' : '#0f0';
        ctx.fillRect(canvas.width / 2 - 170, 80, 340 * Math.max(0, boss.hp / boss.maxHp), 20);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(boss.phase === 2 ? 'BOSS - RAGE' : 'BOSS', canvas.width / 2, 96);
        ctx.textAlign = 'left';
    }

    function handleBossCollisions(boss, index) {
        const left = boss.x - 85;
        const right = boss.x + 85;
        const top = boss.y - 62;
        const bottom = boss.y + 62;

        for (let b = bullets.length - 1; b >= 0; b--) {
            const bullet = bullets[b];
            if (!bullet.isEnemy && bullet.x > left && bullet.x < right && bullet.y > top && bullet.y < bottom) {
                boss.hp -= bullet.damage || 10;
                createExplosion(bullet.x, bullet.y, '#fff');
                bullets.splice(b, 1);
            }
        }

        if (!isInvincible && player.x > left && player.x < right && player.y > top && player.y < bottom) {
            damagePlayer(45, player.x, player.y);
        }

        if (boss.hp <= 0) {
            createMegaExplosion(boss.x, boss.y);
            score += 2000 + level * 100;
            showMessage('BOSS BESIEGT!');
            bosses.splice(index, 1);
            bossDefeatedThisLevel = true;
        }
    }

    function checkEnemyCollisions(obj, index) {
        if (!isInvincible && Math.hypot(player.x - obj.x, player.y - obj.y) < obj.size + 14) {
            damagePlayer(20, obj.x, obj.y);
            enemies.splice(index, 1);
            return true;
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            if (b.isEnemy) continue;

            if (Math.hypot(b.x - obj.x, b.y - obj.y) < obj.size + b.size) {
                obj.hp -= b.damage || 10;
                bullets.splice(i, 1);
                createExplosion(obj.x, obj.y, '#ffaa00');

                if (obj.hp <= 0) {
                    enemies.splice(index, 1);
                    score += Math.floor(22 + obj.size * 1.4);
                    return true;
                }
            }
        }
        return false;
    }

    function spawnPowerUp() {
        const types = ['health', 'rapid', 'shield', 'spread', 'bomb'];
        const type = types[Math.floor(Math.random() * types.length)];
        const data = {
            health: { color: '#0f0', label: '+' },
            rapid: { color: '#ff0', label: 'R' },
            shield: { color: '#00f', label: 'S' },
            spread: { color: '#f0f', label: 'W' },
            bomb: { color: '#fff', label: 'B' }
        }[type];

        powerUps.push({
            x: canvas.width + 25,
            y: 50 + Math.random() * (canvas.height - 100),
            size: 15,
            type,
            color: data.color,
            label: data.label,
            speed: 2.8 + threatLevel() * 0.18
        });
    }

    function updatePowerUps() {
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const p = powerUps[i];
            p.x -= p.speed;

            if (magnetRange > 0) {
                const d = Math.hypot(player.x - p.x, player.y - p.y);
                if (d < magnetRange) {
                    const angle = Math.atan2(player.y - p.y, player.x - p.x);
                    p.x += Math.cos(angle) * 5.5;
                    p.y += Math.sin(angle) * 5.5;
                }
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(p.label, p.x, p.y + 5);
            ctx.textAlign = 'left';
            ctx.shadowBlur = 0;

            if (Math.hypot(player.x - p.x, player.y - p.y) < 32) {
                activatePowerUp(p.type);
                powerUps.splice(i, 1);
                continue;
            }

            if (p.x < -60) powerUps.splice(i, 1);
        }
    }

    function activatePowerUp(type) {
        createExplosion(player.x, player.y, '#fff');

        if (type === 'health') {
            health = Math.min(health + 30, 100);
            showMessage('REPAIRED!');
        } else if (type === 'rapid') {
            effects.rapid = FPS * 8;
            showMessage('RAPID FIRE 8s!');
        } else if (type === 'shield') {
            effects.shield = FPS * 6;
            invincibleTimer = Math.max(invincibleTimer, FPS * 6);
            showMessage('SHIELD 6s!');
        } else if (type === 'spread') {
            effects.spread = FPS * 8;
            showMessage('SPREAD 8s!');
        } else if (type === 'bomb') {
            smartBomb();
            showMessage('SCREEN CLEAR!');
        }
    }

    function smartBomb() {
        enemies.forEach(e => createExplosion(e.x, e.y, '#ffaa00'));
        worms.forEach(w => w.segments.forEach(s => createExplosion(s.x, s.y, '#d0d')));
        score += enemies.length * 35 + worms.length * 180;
        enemies = [];
        worms = [];
        bullets = bullets.filter(b => !b.isEnemy);
        bosses.forEach(boss => {
            boss.hp -= 120;
            createExplosion(boss.x, boss.y, '#fff');
        });
    }

    function damagePlayer(amount, x, y) {
        if (isInvincible) return;
        health -= amount;
        invincibleTimer = 55;
        createExplosion(x, y, '#f00');
        if (health <= 0) gameOver();
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 10; i++) {
            particles.push({
                x,
                y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                life: 30,
                maxLife: 30,
                color,
                size: 3
            });
        }
    }

    function createMegaExplosion(x, y) {
        for (let i = 0; i < 45; i++) {
            particles.push({
                x,
                y,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 50,
                maxLife: 50,
                color: `hsl(${Math.random() * 60}, 100%, 50%)`,
                size: Math.random() * 8 + 2
            });
        }
        ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.life--;
            p.x += p.vx || 0;
            p.y += p.vy || 0;
            ctx.globalAlpha = Math.max(0, p.life / (p.maxLife || 30));
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size || 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            if (p.life <= 0 || p.x < -120 || p.x > canvas.width + 120 || p.y < -120 || p.y > canvas.height + 120) {
                particles.splice(i, 1);
            }
        }
    }

    function drawPlayer() {
        ctx.save();
        ctx.translate(player.x, player.y);

        if (isInvincible && Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.globalAlpha = 0.55;
        }

        if (effects.shield > 0) {
            ctx.shadowBlur = 22;
            ctx.shadowColor = '#00f';
            ctx.strokeStyle = '#44f';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, 34, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.shadowBlur = 20;
        ctx.shadowColor = '#0ff';
        ctx.fillStyle = '#0af';
        ctx.beginPath();
        ctx.moveTo(27, 0);
        ctx.lineTo(-22, 18);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-22, -18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#0ff';
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    function levelUp() {
        document.getElementById('levelVal').innerText = level;
        document.getElementById('nextLevelVal').innerText = nextLevelScore;
        openUpgradeMenu();
    }

    function enforceEntityCaps() {
        if (bullets.length > LIMITS.bullets) bullets.splice(0, bullets.length - LIMITS.bullets);
        if (particles.length > LIMITS.particles) particles.splice(0, particles.length - LIMITS.particles);
        if (enemies.length > LIMITS.enemies) enemies.splice(0, enemies.length - LIMITS.enemies);
        if (powerUps.length > LIMITS.powerUps) powerUps.splice(0, powerUps.length - LIMITS.powerUps);
    }

    function activeEffectLabel() {
        const list = [];
        if (effects.rapid > 0) list.push(`Rapid ${Math.ceil(effects.rapid / FPS)}s`);
        if (effects.spread > 0) list.push(`Spread ${Math.ceil(effects.spread / FPS)}s`);
        if (effects.shield > 0) list.push(`Shield ${Math.ceil(effects.shield / FPS)}s`);
        return list.length ? list.join(' / ') : '-';
    }

    function weaponLabel() {
        return `${currentBulletCount()}x / CD ${currentFireCooldown()} / DMG ${Math.round(8 + weapon.bulletSizeMod * 5)}`;
    }

    function showMessage(text) {
        msgBox.innerText = text;
        msgBox.style.display = 'block';
        clearTimeout(showMessage.timer);
        showMessage.timer = setTimeout(() => { msgBox.style.display = 'none'; }, 1400);
    }

    function drawUI() {
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('levelVal').innerText = level;
        document.getElementById('nextLevelVal').innerText = nextLevelScore;
        document.getElementById('weaponVal').innerText = weaponLabel();
        document.getElementById('effectVal').innerText = activeEffectLabel();
        document.getElementById('threatVal').innerText = `${threatLevel().toFixed(1)}x`;
        healthBar.style.width = Math.max(0, health) + '%';
        healthBar.style.background = health < 35 ? '#f00' : '#0f0';
    }

    function gameOver() {
        gameRunning = false;
        setTimeout(() => {
            alert('GAME OVER\nScore: ' + score + '\nLevel: ' + level);
            location.reload();
        }, 100);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = Math.min(player.y, canvas.height - 20);
    });

    update();
</script>
</body>
</html>
